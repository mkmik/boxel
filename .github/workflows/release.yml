name: Release

on:
  push:
    tags:
      - "v*"
  # Called by auto-release.yml after it pushes a tag: tags pushed with
  # GITHUB_TOKEN do not trigger the tag-push event above.
  workflow_call:

permissions:
  contents: write

jobs:
  goreleaser:
    name: goreleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser needs the full history and tags for the changelog
          # and for Go to stamp the module version from the tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
